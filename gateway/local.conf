server {
    listen 80 default_server;
    server_name xmambos.com teladoshi.com localhost ~^(?<tenant>.+)\\.localhost$ ~^(?<tenant>.+)\\.xmambos\\.(local|com)$ ~^(?<tenant>.+)\\.teladoshi\\.(local|com)$;

    resolver 127.0.0.11 8.8.8.8 valid=30s;

    # Redirect clean prefix paths to trailing slash so upstream path stripping works consistently.
    location = /certificates {
        return 301 $scheme://$host/certificates/;
    }
    location = /remittance {
        return 301 $scheme://$host/remittance/;
    }
    location = /tour {
        return 301 $scheme://$host/tour/;
    }
    location = /cms {
        return 301 $scheme://$host/cms/;
    }

    location /certificates/ {
        proxy_pass ${CERTIFICATES_URL}/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /certificates;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        # Enable SNI and relax SSL verification for upstreams using HTTPS
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_ciphers HIGH:!aNULL:!MD5;
        proxy_ssl_verify off;
        proxy_redirect off;
    }

    location /remittance/ {
        proxy_pass ${REMITTANCE_URL}/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /remittance;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_ciphers HIGH:!aNULL:!MD5;
        proxy_ssl_verify off;
        proxy_redirect off;
    }

    location /tour/ {
        proxy_pass ${TOUR_URL}/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /tour;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_ciphers HIGH:!aNULL:!MD5;
        proxy_ssl_verify off;
        proxy_redirect off;
    }

    location /cms/ {
        proxy_pass ${CMS_URL}/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /cms;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_ciphers HIGH:!aNULL:!MD5;
        proxy_ssl_verify off;
        proxy_redirect off;
    }

    location / {
        proxy_pass ${CMS_URL};
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        # If upstream uses HTTPS, enable SNI and TLS options so the handshake succeeds.
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_ciphers HIGH:!aNULL:!MD5;
        proxy_ssl_verify off;
        proxy_redirect off;
    }
}
