server {
    listen 80;
    server_name xmambos.com ~^(?<tenant>.+)\.xmambos\.(local|com)$ ~^(?<tenant>.+)\..+$;

    resolver 8.8.8.8 8.8.4.4 valid=30s;

    location /certificates/ {
        proxy_pass ${CERTIFICATES_URL};
        # FIX: Dynamically extracts the clean domain name from the variable URL
        proxy_set_header Host $proxy_host; 
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /remittance/ {
        proxy_pass ${REMITTANCE_URL};
        proxy_set_header Host $proxy_host; # FIX
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tour/ {
        proxy_pass ${TOUR_URL};
        proxy_set_header Host $proxy_host; # FIX
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass ${CMS_URL};
        proxy_set_header Host $proxy_host; # FIX
        proxy_set_header X-Tenant $tenant;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
